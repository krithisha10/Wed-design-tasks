<!DOCTYPE html>
<html>
<head>
    <title>Application Form </title>
</head>
<body bgcolor="lightblue">

<center>
    <h2>APPLICATION FORM</h2>

    <form onsubmit="return validateForm()">

        <table border="1" cellpadding="15" width="60%" height="450px" bgcolor="white">

            <tr>
                <td>Name</td>
                <td><input type="text" id="name" required></td>
            </tr>

            <tr>
                <td>Email</td>
                <td><input type="email" id="email" required></td>
            </tr>

            <tr>
                <td>Phone Number</td>
                <td><input type="text" id="phone" required></td>
            </tr>

            <tr>
                <td>Course</td>
                <td>
                    <select id="course">
                        <option>B.Sc Computer Science</option>
                        <option>BCA</option>
                        <option>B.Com</option>
                        <option>MCA</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td colspan="2" align="center">
                    <input type="submit" value="Submit">
                    <input type="reset" value="Reset">
                </td>
            </tr>

        </table>

    </form>
</center>

<script>
function validateForm()
{
    var name = document.getElementById("name").value;

    var appNo = prompt("Enter Application Number:");

    if(appNo == "" || appNo == null)
    {
        alert("Please enter Application Number");
        return false;
    }

    var check = confirm("Do you want to submit the application?");

    if(check)
    {
        alert("Application Submitted Successfully!\nWelcome " + name);
        return true;
    }
    else
    {
        alert("Application Submission Cancelled");
        return false;
    }
}
</script>

</body>
</html>
